<svg width="640" height="560" viewBox="0 0 640 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Financial dashboard illustration">
  <defs>
    <linearGradient id="cardG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#F1F7F3"/>
    </linearGradient>
    <linearGradient id="barG" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#1B5E20"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="lineG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#10B981"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="goldG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E0C766"/>
      <stop offset="1" stop-color="#C9A227"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#0B3D1A" flood-opacity="0.16"/>
    </filter>
    <filter id="soft2" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0B3D1A" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- Main dashboard card -->
  <g filter="url(#soft)">
    <rect x="70" y="70" width="500" height="360" rx="28" fill="url(#cardG)"/>
  </g>
  <rect x="70.5" y="70.5" width="499" height="359" rx="27.5" fill="none" stroke="#10B981" stroke-opacity="0.14"/>

  <!-- Card header -->
  <circle cx="104" cy="106" r="12" fill="#10B981" fill-opacity="0.14"/>
  <path d="M99 106l3.6 3.6 6.4-7.2" stroke="#10B981" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="126" y="99" width="120" height="9" rx="4.5" fill="#1E293B" fill-opacity="0.82"/>
  <rect x="126" y="115" width="76" height="7" rx="3.5" fill="#64748B" fill-opacity="0.5"/>
  <rect x="470" y="96" width="72" height="26" rx="13" fill="#10B981" fill-opacity="0.12"/>
  <text x="506" y="113" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#0E7C4D" text-anchor="middle">+18.2%</text>

  <!-- Area/line chart -->
  <g>
    <polyline points="104,300 168,268 232,286 296,232 360,250 424,196 488,214 536,168"
      fill="none" stroke="url(#lineG)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M104,300 168,268 232,286 296,232 360,250 424,196 488,214 536,168 536,360 104,360 Z"
      fill="url(#lineG)" fill-opacity="0.10"/>
    <circle cx="424" cy="196" r="6" fill="#ffffff" stroke="#10B981" stroke-width="3"/>
    <circle cx="536" cy="168" r="6" fill="#ffffff" stroke="#22C55E" stroke-width="3"/>
  </g>

  <!-- Mini bars -->
  <rect x="104" y="386" width="70" height="20" rx="6" fill="#0F172A" fill-opacity="0.05"/>
  <rect x="188" y="386" width="46" height="20" rx="6" fill="#0F172A" fill-opacity="0.05"/>
  <rect x="466" y="384" width="70" height="24" rx="8" fill="url(#barG)"/>
  <text x="501" y="400" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">FILE ITR</text>

  <!-- Floating stat card: Refund -->
  <g filter="url(#soft2)">
    <rect x="12" y="196" width="176" height="96" rx="20" fill="#ffffff"/>
  </g>
  <circle cx="44" cy="228" r="18" fill="#22C55E" fill-opacity="0.14"/>
  <path d="M44 220v16m0-16l-5 5m5-5l5 5" stroke="#16A34A" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="72" y="216" width="96" height="8" rx="4" fill="#64748B" fill-opacity="0.5"/>
  <text x="72" y="252" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#0E7C4D">₹1,24,500</text>
  <rect x="72" y="262" width="70" height="7" rx="3.5" fill="#64748B" fill-opacity="0.4"/>

  <!-- Floating badge: GST filed -->
  <g filter="url(#soft2)">
    <rect x="452" y="248" width="176" height="72" rx="18" fill="#0F2E1A"/>
  </g>
  <circle cx="486" cy="284" r="17" fill="#10B981"/>
  <path d="M480 284l4 4 8-9" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="514" y="268" width="86" height="8" rx="4" fill="#ffffff" fill-opacity="0.9"/>
  <rect x="514" y="286" width="60" height="7" rx="3.5" fill="#ffffff" fill-opacity="0.45"/>

  <!-- Gold verified seal -->
  <g filter="url(#soft2)">
    <circle cx="560" cy="118" r="34" fill="#ffffff"/>
  </g>
  <circle cx="560" cy="118" r="24" fill="none" stroke="url(#goldG)" stroke-width="2.5" stroke-dasharray="4 4"/>
  <path d="M552 118l5 5 11-12" stroke="url(#goldG)" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Coins -->
  <g filter="url(#soft2)">
    <ellipse cx="120" cy="470" rx="52" ry="16" fill="#C9A227" fill-opacity="0.18"/>
  </g>
  <rect x="80" y="426" width="80" height="26" rx="13" fill="url(#goldG)"/>
  <rect x="80" y="440" width="80" height="26" rx="13" fill="url(#goldG)" fill-opacity="0.85"/>
  <rect x="80" y="454" width="80" height="22" rx="11" fill="url(#goldG)" fill-opacity="0.7"/>
</svg>
